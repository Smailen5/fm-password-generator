name: Bug Report
description: Segnala e risolvi un malfunzionamento nel codice
title: 'bug: [descrizione breve]'
labels: ['bug']
assignees: 'Smailen5'
body:
 - type: markdown
   attributes:
     value: |
       Descrivi quanto piu' possibile il bug, in modo chiaro e dettagliato.

 - type: textarea
   id: description
   attributes:
     label: Descrizione e Riproduzione
     description: "Cosa si e' rotto e quali sono i passaggi per riprodurre l'errore?"
     placeholder: |
       Il componente di login va in crash.
       1. Vai su /login
       2. Inserisci le credenziali
       3. Clicca 'Accedi' -> Schermata bianca
   validations:
     required: true

 - type: textarea
   id: acceptance_criteria
   attributes:
     label: Comportamento Atteso (Criteri di Accettazione)
     description: "Come dovrebbe funzionare correttamente?"
     placeholder: |
       - Il login deve completarsi con successo
       - L'utente deve essere reindirizzato alla dashboard
       - Nessun errore in console
   validations:
     required: true

 - type: textarea
   id: task
   attributes:
     label: Task (Risoluzione)
     description: "Ipotesi o passaggi tecnici per risolvere il bug."
     placeholder: |
       - [ ] Verificare il payload della richiesta API
       - [ ] Aggiungere blocco try/catch nel gestore del click
       - [ ] Scrivere test per evitare regressioni
   validations:
     required: true

 - type: textarea
   id: logs
   attributes:
     label: Log / Stack Trace (Fortemente consigliato)
     placeholder: "Incolla qui l'errore del terminale o della console del browser."
     render: shell
