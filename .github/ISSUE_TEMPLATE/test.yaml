name: Test
description: Crea o migliora la suite di test (unitari, e2e, integrazione)
title: 'test: [descrizione breve]'
labels: ['test']
body:
  - type: markdown
    attributes:
      value: |
        Definisci chiaramente quali casi d'uso devono essere coperti dai nuovi test.

  - type: textarea
    id: description
    attributes:
      label: Descrizione
      description: "Quali funzioni o componenti necessitano di test?"
      placeholder: "La funzione che calcola i prezzi scontati non ha copertura di test e potrebbe generare bug in produzione."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Criteri di Accettazione (Casi d'uso)
      description: "Quali specifici scenari devono essere verificati dal test?"
      placeholder: |
        - Il test deve verificare uno sconto del 0%
        - Il test deve calcolare correttamente i decimali
        - Il test deve fallire se si passa un valore negativo
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Task
      description: "Passaggi tecnici per la stesura."
      placeholder: |
        - [ ] Configurare il file di test separato (.test.ts)
        - [ ] Scrivere i mock per i dati di input
        - [ ] Eseguire copertura e raggiungere il 90% sulla funzione
    validations:
      required: true